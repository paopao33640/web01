<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人介紹</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 800px;
            max-width: 90%;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3498db;
        }

        h1 {
            margin-top: 15px;
            color: #333;
        }

        .job-title {
            color: #3498db;
            font-size: 18px;
            margin: 10px 0;
        }

        .about {
            margin: 20px 0;
            line-height: 1.8;
            color: #555;
        }

        .skills {
            margin-top: 20px;
        }

        .skills h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .skill-list {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
        }

        .contact {
            margin-top: 25px;
        }

        .contact a {
            text-decoration: none;
            color: #3498db;
            margin: 0 10px;
            font-weight: bold;
        }

        .contact a:hover {
            color: #21618c;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="個人照片" class="profile-img">

        <h1>王小明</h1>
        <p class="job-title">前端工程師 / 網頁設計師</p>

        <div class="about">
            <p>
                大家好，我是王小明，熱愛網頁開發與 UI 設計。
                擅長 HTML、CSS、JavaScript，喜歡將創意轉化為實際作品，
                持續學習新技術並提升使用者體驗。
            </p>
        </div>

        <div class="skills">
            <h2>專長技能</h2>
            <div class="skill-list">
                <div class="skill">HTML</div>
                <div class="skill">CSS</div>
                <div class="skill">JavaScript</div>
                <div class="skill">Bootstrap</div>
                <div class="skill">React</div>
            </div>
        </div>

        <div class="contact">
            <h2>聯絡方式</h2>
            <p>
                <a href="mailto:example@gmail.com">Email</a>
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
            </p>
        </div>
    </div>

</body>
</html>
